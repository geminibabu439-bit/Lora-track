<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model Tracker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

    <div class="brand">
        <span class="eyebrow">Model Access Log</span>
        <h1 class="logo">AI Model Tracker</h1>
    </div>

    <input
        type="text"
        id="search"
        placeholder="Search character…"
    >

    <button id="addRowBtn" style="display:none;">
        + Add Row
    </button>

    <span id="syncStatus" class="sync-status" data-state="connecting">
        <span class="dot"></span>connecting…
    </span>

    <div id="authArea" class="auth-area">
        <form id="loginForm" class="login-form">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Sign in</button>
        </form>
        <button id="logoutBtn" style="display:none;">Sign out</button>
    </div>

</header>

<main class="container">

<table id="tracker">

<thead>

<tr>

<th>Photo</th>
<th>Character</th>
<th>Krea</th>
<th>Klein 9B</th>
<th>Z Turbo</th>
<th>Link</th>
<th>Notes</th>

</tr>

</thead>

<tbody>
<!-- Rows are built dynamically by app.js from Firestore data -->
</tbody>

</table>

</main>

<!-- Firebase (compat SDK - simplest for plain <script> usage, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="firebase-config.js"></script>
<script src="app.js"></script>

</body>
</html>
